<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:include="fragments/header :: header"></head>
<body>
<div th:replace="fragments/navigation :: navigation"></div>
<div class="container content pt-3">
    <div class="card" style="width: 100%">
        <div class="card-header">
            Новый инцидент
        </div>
        <div class="card-body">
            <form th:action="@{/updateAccident}" method="POST" enctype="multipart/form-data" th:object="${accident}">
                <input type="hidden" name="id"  th:field="*{id}" th:value="*{id}">

                <div class="form-group">
                    <label for="name">Название *</label>
                    <input type="text" class="form-control" name="name" id="name" th:field="*{name}" th:value="*{name}" required>
                </div>
                <div class="form-group">
                    <label for="text">Описание *</label>
                    <textarea class="form-control" name="text" id="text" rows="5" th:field="*{text}" th:value="*{text}" required></textarea>
                </div>
                <div class="form-group">
                    <label for="address">Адрес *</label>
                    <input type="text" class="form-control" name="address" id="address" th:field="*{address}" th:value="*{address}" required>
                </div>
                <div class="form-group">
                    <label for="type.id">Тип *</label>
                    <!-- Немного магии Spring -->
                    <!-- Возможно она работает только в связке с Hibernate ))) -->
                    <select class="form-control" id="type.id"  name="type.id" required>
                        <option th:each="type: ${types}"
                                th:text="${type.name}"
                                th:value="${type.id}"
                                th:selected="${type.id} == ${accident.type.id}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="rulesIds" name="rIds">Статья * (можно выбрать несколько зажав Ctrl)</label>
                    <select class="form-control" id="rulesIds" name="rulesIds" multiple required>
                        <option th:each="rule : ${rules}"
                                th:text="${rule.name}"
                                th:value="${rule.id}"
                                th:selected="${accident.rules.contains(rule)}"></option>
                    </select>
                </div>
                <div class="col-6 py-3">
                    * поля обязательные к заполнению
                </div>
                <div class="col-8">
                    <div class="row">
                        <div class="col-4"><a class="btn btn-info w-100"
                                              th:href="@{/index}">Отмена</a></div> <!-- Светло-синяя кнопка -->
                        <div class="col-4"><a class="btn btn-danger w-100"
                                              th:href="@{|/deleteAccident?id=${accident.id}|}">Удалить</a></div> <!-- Красная кнопка -->
                        <div class="col-4"><button class="btn btn-success w-100"
                                                   type="submit">Сохранить</button> <!-- Зелёная кнопка -->
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<div th:include="fragments/footer :: footer"></div>
</body>
</html>
