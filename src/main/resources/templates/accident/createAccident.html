<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:include="fragments/header :: header"></head>
<body>
<div th:replace="fragments/navigation :: navigation"></div>
<div class="container content pt-3">
    <div class="card" style="width: 100%">
        <div class="card-header">
            Новый инцидент
        </div>
        <div class="card-body">
            <form th:action="@{/saveAccident}" method="POST" enctype="multipart/form-data">
                <input type="hidden" name="id" value="0">

                <div class="form-group">
                    <label for="name">Название *</label>
                    <input type="text" class="form-control" name="name" id="name" required>
                </div>
                <div class="form-group">
                    <label for="text">Описание *</label>
                    <textarea class="form-control" name="text" id="text"  rows="5" required></textarea>
                </div>
                <div class="form-group">
                    <label for="address">Адрес *</label>
                    <input type="text" class="form-control" name="address" id="address" required>
                </div>
                <div class="form-group">
                    <label for="type.id">Тип</label>
                    <!-- Немного магии Spring, но она не работает -->
                    <select class="form-control" id="type.id"  name="type.id">
                        <option th:each="type: ${types}"
                                th:text="${type.name}"
                                th:value="${type.id}"></option>
                    </select>
                </div>
                <div class="col-6 py-3">
                    * поля обязательные к заполнению
                </div>
                <div class="col-6">
                    <div class="row">
                        <div class="col-6"><a class="btn btn-danger w-100"
                                              th:href="@{/index}">Отмена</a></div>
                        <div class="col-6"><button class="btn btn-primary w-100"
                                                   type="submit">Сохранить</button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<div th:include="fragments/footer :: footer"></div>
</body>
</html>
